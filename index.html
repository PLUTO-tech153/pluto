<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포항제철중학교 2026학년도 학사일정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --c-all:  #f59e0b;
  --c-1:    #ef4444;
  --c-2:    #10b981;
  --c-3:    #3b82f6;
  --c-exam: #7c3aed;
  --c-holi: #94a3b8;
  --c-sch:  #0ea5e9;
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; overflow:hidden; }
body { font-family:'Noto Sans KR',sans-serif; background:#0f172a; color:#1e293b; display:flex; flex-direction:column; }

/* ── HEADER ── */
.hdr {
  background:#0f172a;
  padding:10px 20px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.hdr-left { display:flex; align-items:center; gap:10px; }
.logo-wrap { width:38px; height:38px; background:#ffffff !important; border-radius:8px; overflow:hidden; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 0 0 3px #ffffff, 0 0 0 5px rgba(255,255,255,0.5); border:2px solid #ffffff; padding:2px; }
.logo-wrap img { width:100%; height:100%; object-fit:contain; }
.hdr h1 { color:#fff; font-size:16px; font-weight:700; white-space:nowrap; }
.hdr-date { color:rgba(255,255,255,.6); font-size:13px; white-space:nowrap; }
.hdr-date strong { color:#fff; }

/* ── SHORTCUTS ── */
.sc-bar {
  background:#1e293b;
  padding:6px 20px;
  display:flex; align-items:center; gap:8px;
  flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.sc-lbl { color:rgba(255,255,255,.35); font-size:11px; }
.sc-a {
  display:flex; align-items:center; gap:6px;
  padding:6px 16px; border-radius:7px;
  text-decoration:none; font-size:13px; font-weight:700;
  color:#fff; transition:opacity .15s;
}
.sc-a:hover { opacity:.8; }
.sc-a.neis { background:#3b82f6; }
.sc-a.ep   { background:#64748b; }
.sc-a.sheet{ background:#10b981; }

/* ── BODY LAYOUT ── */
.body-wrap {
  flex:1; display:grid;
  grid-template-columns:1fr 320px;
  gap:0; overflow:hidden;
  background:#f1f5f9;
}
@media(max-width:1000px) { .body-wrap { grid-template-columns:1fr; } .side { display:none; } }

/* ── CALENDAR PANEL ── */
.cal-panel {
  display:flex; flex-direction:column;
  padding:16px 16px 12px;
  overflow:hidden;
  background:#f1f5f9;
}
.cal-top {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px; flex-shrink:0; gap:12px; flex-wrap:wrap;
}
.cal-nav { display:flex; align-items:center; gap:8px; }
.cal-nav-btn {
  width:32px; height:32px; border-radius:7px;
  border:1.5px solid #cbd5e1; background:#fff;
  font-size:16px; cursor:pointer; color:#475569;
  display:flex; align-items:center; justify-content:center;
  transition:all .12s;
}
.cal-nav-btn:hover { background:#0f172a; color:#fff; border-color:#0f172a; }
.cal-today-btn {
  padding:6px 14px; border-radius:7px;
  border:1.5px solid #cbd5e1; background:#fff;
  font-size:12px; font-weight:700; cursor:pointer; color:#475569;
  font-family:inherit; transition:all .12s;
}
.cal-today-btn:hover { background:#0f172a; color:#fff; border-color:#0f172a; }
.cal-month-title { font-size:22px; font-weight:700; color:#0f172a; }

/* 학년 필터 탭 */
.grade-tabs { display:flex; gap:6px; }
.gt {
  padding:7px 18px; border-radius:20px;
  font-size:13px; font-weight:700; cursor:pointer;
  border:2px solid transparent; background:#fff; color:#888;
  transition:all .13s; box-shadow:0 1px 3px rgba(0,0,0,.07);
}
.gt:hover { opacity:.85; }
/* 비활성 탭: 컬러 테두리 + 컬러 글자 */
.gt[data-g="all"]  { border-color:var(--c-all); color:var(--c-all); }
.gt[data-g="1"]    { border-color:var(--c-1);   color:var(--c-1);   }
.gt[data-g="2"]    { border-color:var(--c-2);   color:var(--c-2);   }
.gt[data-g="3"]    { border-color:var(--c-3);   color:var(--c-3);   }
/* 활성 탭: 배경 채우기 + 흰 글자 */
.gt[data-g="all"].on  { background:var(--c-all); color:#fff; border-color:var(--c-all); }
.gt[data-g="1"].on    { background:var(--c-1);   color:#fff; border-color:var(--c-1);   }
.gt[data-g="2"].on    { background:var(--c-2);   color:#fff; border-color:var(--c-2);   }
.gt[data-g="3"].on    { background:var(--c-3);   color:#fff; border-color:var(--c-3);   }

/* ── CALENDAR GRID ── */
.cal-grid-wrap {
  flex:1; display:flex; flex-direction:column;
  background:#fff; border-radius:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
  overflow:hidden; min-height:0;
}
.dow-row {
  display:grid; grid-template-columns:repeat(7,1fr);
  background:#f8fafc; border-bottom:1px solid #e2e8f0;
  flex-shrink:0;
}
.dow { text-align:center; padding:8px 0; font-size:12px; font-weight:700; color:#94a3b8; }
.dow:first-child { color:#ef4444; }
.dow:last-child  { color:#3b82f6; }

.cal-days {
  flex:1; display:grid;
  grid-template-columns:repeat(7,1fr);
  grid-auto-rows:1fr;
  gap:1px; background:#e2e8f0;
  overflow:hidden;
}
.cal-cell {
  background:#fff; padding:5px 5px 4px;
  display:flex; flex-direction:column;
  min-height:0; overflow:hidden;
  position:relative;
}
.cal-cell.empty { background:#f8fafc; }
.cal-cell.today { background:#fffbeb; }
.cal-cell.today::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px; background:#f59e0b;
}
.cal-cell.sun .dn { color:#ef4444; }
.cal-cell.sat .dn { color:#3b82f6; }
.cal-cell.other { opacity:.4; }
.dn {
  font-size:13px; font-weight:700; width:24px; height:24px;
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; flex-shrink:0; color:#1e293b; margin-bottom:2px;
}
.cal-cell.today .dn { background:#f59e0b; color:#fff; }

.ev-list { flex:1; overflow:hidden; display:flex; flex-direction:column; gap:2px; }
.ev {
  font-size:10px; padding:2px 4px; border-radius:3px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  font-weight:600; line-height:1.4; cursor:default;
}
/* 학사일정 타입별 색 */
.ev.school  { background:#e0f2fe; color:#0369a1; border-left:3px solid #0ea5e9; }
.ev.exam    { background:#ede9fe; color:#5b21b6; border-left:3px solid #7c3aed; }
.ev.holiday { background:#f1f5f9; color:#64748b; border-left:3px solid #94a3b8; }
/* 구글시트 학년별 색 */
.ev.dl-all  { background:#fff7ed; color:#92400e; border-left:3px solid #f59e0b; }
.ev.dl-1    { background:#fee2e2; color:#991b1b; border-left:3px solid #ef4444; }
.ev.dl-2    { background:#d1fae5; color:#065f46; border-left:3px solid #10b981; }
.ev.dl-3    { background:#dbeafe; color:#1d4ed8; border-left:3px solid #3b82f6; }
.ev.tr-all  { background:#f0fdf4; color:#14532d; border-left:3px solid #22c55e; }
.ev.tr-1    { background:#fce7f3; color:#831843; border-left:3px solid #ec4899; }
.ev.tr-2    { background:#fff3e0; color:#7c3600; border-left:3px solid #f97316; }
.ev.tr-3    { background:#faf5ff; color:#581c87; border-left:3px solid #a855f7; }

/* ── SIDE PANEL ── */
.side {
  background:#fff; border-left:1px solid #e2e8f0;
  display:flex; flex-direction:column; overflow:hidden;
}
.side-inner { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; }
.side-inner::-webkit-scrollbar { width:5px; }
.side-inner::-webkit-scrollbar-thumb { background:#e2e8f0; border-radius:3px; }

.side-section h3 {
  font-size:13px; font-weight:700; color:#0f172a;
  margin-bottom:8px; padding-bottom:6px;
  border-bottom:2px solid #f1f5f9;
  display:flex; align-items:center; gap:6px;
}
.li {
  padding:10px 12px; border-radius:10px;
  background:#f8fafc; margin-bottom:6px;
  border-left:4px solid #cbd5e1;
  cursor:default;
}
.li.g-all { border-color:var(--c-all); }
.li.g-1   { border-color:var(--c-1);   background:#fff5f5; }
.li.g-2   { border-color:var(--c-2);   background:#f0fdf4; }
.li.g-3   { border-color:var(--c-3);   background:#eff6ff; }
.li-top { display:flex; justify-content:space-between; align-items:flex-start; gap:6px; }
.li-title { font-size:13px; font-weight:700; color:#1e293b; line-height:1.3; }
.li-dday {
  font-size:11px; font-weight:700; padding:2px 7px; border-radius:10px;
  white-space:nowrap; flex-shrink:0;
}
.li-dday.red  { background:#fee2e2; color:#991b1b; }
.li-dday.org  { background:#fff7ed; color:#92400e; }
.li-dday.grn  { background:#d1fae5; color:#065f46; }
.li-dday.gry  { background:#f1f5f9; color:#64748b; }
.li-meta { font-size:11px; color:#94a3b8; margin-top:4px; }
.g-badge {
  display:inline-block; font-size:10px; font-weight:700;
  padding:1px 6px; border-radius:4px; margin-left:4px;
}
.gb-all { background:#fff7ed; color:#92400e; }
.gb-1   { background:#fee2e2; color:#991b1b; }
.gb-2   { background:#d1fae5; color:#065f46; }
.gb-3   { background:#dbeafe; color:#1d4ed8; }
.empty-msg { font-size:13px; color:#94a3b8; text-align:center; padding:16px 0; }

/* ── 설정 버튼 ── */
.cfg-btn {
  position:fixed; bottom:18px; right:18px; z-index:200;
  width:44px; height:44px; border-radius:50%;
  background:#0f172a; color:#fff; border:none;
  font-size:20px; cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.25);
  transition:all .15s;
}
.cfg-btn:hover { background:#1e3a5f; }
.cfg-panel {
  position:fixed; bottom:70px; right:18px; z-index:200;
  width:290px; background:#fff; border-radius:14px;
  padding:18px; box-shadow:0 10px 30px rgba(0,0,0,.2);
  display:none;
}
.cfg-panel.open { display:block; }
.cfg-panel h4 { font-size:13px; font-weight:700; color:#0f172a; margin-bottom:10px; }
.cfg-input {
  width:100%; padding:9px 10px; border:1.5px solid #e2e8f0;
  border-radius:8px; font-size:12px; font-family:monospace;
  color:#1e293b; background:#f8fafc; outline:none;
}
.cfg-input:focus { border-color:#3b82f6; background:#fff; }
.cfg-refresh {
  width:100%; margin-top:10px; padding:10px;
  background:#0f172a; color:#fff; border:none;
  border-radius:9px; font-size:13px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:background .12s;
}
.cfg-refresh:hover { background:#1e3a5f; }
.cfg-msg { font-size:12px; margin-top:7px; min-height:16px; text-align:center; }
.cfg-msg.ok { color:#10b981; }
.cfg-msg.er { color:#ef4444; }

/* legend */
.legend {
  display:flex; flex-wrap:wrap; gap:8px;
  padding:8px 12px; background:#f8fafc;
  border-top:1px solid #e2e8f0; flex-shrink:0;
}
.leg { display:flex; align-items:center; gap:4px; font-size:10px; color:#64748b; }
.ld { width:8px; height:8px; border-radius:2px; }
</style>
</head>

026-10-28", "title": "수학여행(2학년 여)", "type": "school", "grade": "2"}, {"date": "2026-10-29", "title": "수학여행(2학년 여)", "type": "school", "grade": "2"}, {"date": "2026-10-30", "title": "수학여행(2학년 여)", "type": "school", "grade": "2"}, {"date": "2026-11-03", "title": "수학여행(2학년 남)", "type": "school", "grade": "2"}, {"date": "2026-11-04", "title": "수학여행(2학년 남)", "type": "school", "grade": "2"}, {"date": "2026-11-05", "title": "수학여행(2학년 남)", "type": "school", "grade": "2"}, {"date": "2026-11-06", "title": "수학여행(2학년 남)", "type": "school", "grade": "2"}, {"date": "2026-11-09", "title": "2차 정기시험(3학년)", "type": "exam", "grade": "3"}, {"date": "2026-11-10", "title": "2차 정기시험(3학년)", "type": "exam", "grade": "3"}, {"date": "2026-11-11", "title": "2차 정기시험(3학년)", "type": "exam", "grade": "3"}, {"date": "2026-11-19", "title": "재량휴업일(수능)", "type": "holiday", "grade": "all"}, {"date": "2026-12-07", "title": "2차 정기시험(1,2학년)", "type": "exam", "grade": "all"}, {"date": "2026-12-08", "title": "2차 정기시험(1,2학년)", "type": "exam", "grade": "all"}, {"date": "2026-12-09", "title": "2차 정기시험(1,2학년)", "type": "exam", "grade": "all"}, {"date": "2026-12-21", "title": "꿈길탐색주간·소견발표", "type": "school", "grade": "all"}, {"date": "2026-12-22", "title": "꿈길탐색주간·학생회선거", "type": "school", "grade": "all"}, {"date": "2026-12-23", "title": "꿈길탐색주간", "type": "school", "grade": "all"}, {"date": "2026-12-24", "title": "방학식", "type": "school", "grade": "all"}, {"date": "2026-12-25", "title": "겨울방학·성탄절", "type": "holiday", "grade": "all"}, {"date": "2027-02-01", "title": "2학기 개학", "type": "school", "grade": "all"}, {"date": "2027-02-05", "title": "졸업식·종업식", "type": "school", "grade": "all"}];
const SAVED_KEY = 'pohang_api_url';
const DAYS = ['일','월','화','수','목','금','토'];

const TODAY = (()=>{ const d=new Date(); d.setHours(0,0,0,0); return d; })();
let CY=TODAY.getFullYear(), CM=TODAY.getMonth(), grade='all', DL=[];

/* ── 날짜 유틸 ── */
function p2(v){ return String(v).padStart(2,'0'); }
function todayStr(){ return `${TODAY.getFullYear()}-${p2(TODAY.getMonth()+1)}-${p2(TODAY.getDate())}`; }
function pd(s){
  const [y,m,d]=s.split('-').map(Number);
  const dt=new Date(y,m-1,d); dt.setHours(0,0,0,0); return dt;
}
function diff(dt){ return Math.round((dt-TODAY)/86400000); }
function fmtDate(s){
  const [y,m,d]=s.split('-');
  const dt=new Date(+y,+m-1,+d);
  return `${+m}월 ${+d}일(${DAYS[dt.getDay()]})`;
}

/* ── 헤더 ── */
(function(){
  document.getElementById('hd-date').textContent=`${TODAY.getFullYear()}년 ${TODAY.getMonth()+1}월 ${TODAY.getDate()}일`;
  document.getElementById('hd-day').textContent=`${DAYS[TODAY.getDay()]}요일`;
})();

/* ── 학년 필터 ── */
function setGrade(g, el){
  grade=g;
  document.querySelectorAll('.gt').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderCal();
  renderSide();
}

/* ── 달력 ── */
function gMatch(evGrade){
  if(grade==='all') return true;
  return evGrade==='all' || evGrade===grade;
}
function renderCal(){
  const td=todayStr();
  document.getElementById('cal-title').textContent=`${CY}년 ${CM+1}월`;
  const fd=new Date(CY,CM,1).getDay();
  const dim=new Date(CY,CM+1,0).getDate();
  const total=Math.ceil((fd+dim)/7)*7;

  // 이벤트 맵
  const em={};
  BASE_EVENTS.forEach(e=>{
    if(!gMatch(e.grade)) return;
    (em[e.date]=em[e.date]||[]).push({t:e.title, cls:e.type==='exam'?'exam':e.type==='holiday'?'holiday':'school'});
  });
  DL.forEach(dl=>{
    if(!gMatch(dl.grade)) return;
    const isTrain = dl.type==='training';
    const cls = isTrain
      ? (dl.grade==='all'?'tr-all':dl.grade==='1'?'tr-1':dl.grade==='2'?'tr-2':'tr-3')
      : (dl.grade==='all'?'dl-all':dl.grade==='1'?'dl-1':dl.grade==='2'?'dl-2':'dl-3');
    (em[dl.date]=em[dl.date]||[]).push({t:dl.title, cls});
  });

  let html='';
  for(let i=0;i<total;i++){
    const dn=i-fd+1;
    const isOut=dn<1||dn>dim;
    const dow=i%7;
    const disp=isOut?(dn<1?new Date(CY,CM,dn).getDate():dn-dim):dn;
    const ds=`${CY}-${p2(CM+1)}-${p2(dn)}`;
    const isT=!isOut&&ds===td;
    let cls='cal-cell'+(isOut?' empty':'')+(isT?' today':'')+(dow===0?' sun':'')+(dow===6?' sat':'');
    const evs=(!isOut&&em[ds])||[];
    const evh=evs.map(e=>`<div class="ev ${e.cls}">${e.t}</div>`).join('');
    html+=`<div class="${cls}"><div class="dn">${disp}</div><div class="ev-list">${evh}</div></div>`;
  }
  document.getElementById('cal-days').innerHTML=html;
}

/* ── 사이드 (서류 / 연수) ── */
function ddayBadge(s){
  const dt=pd(s), dv=diff(dt);
  let cls,txt;
  if(dv<0)      { cls='gry'; txt=`완료`; }
  else if(dv===0){ cls='red'; txt='D-DAY'; }
  else if(dv<=3) { cls='red'; txt=`D-${dv}`; }
  else if(dv<=7) { cls='org'; txt=`D-${dv}`; }
  else           { cls='grn'; txt=`D-${dv}`; }
  return `<span class="li-dday ${cls}">${txt}</span>`;
}
function gradeBadge(g){
  const map={all:['전학년','gb-all'],'1':['1학년','gb-1'],'2':['2학년','gb-2'],'3':['3학년','gb-3']};
  const [lbl,cls]=map[g]||['전학년','gb-all'];
  return `<span class="g-badge ${cls}">${lbl}</span>`;
}
function renderSide(){
  const today=new Date(TODAY); today.setDate(1); today.setHours(0,0,0,0);
  const docs=DL.filter(dl=>dl.type!=='training'&&gMatch(dl.grade)).sort((a,b)=>a.date.localeCompare(b.date));
  const trains=DL.filter(dl=>dl.type==='training'&&gMatch(dl.grade)).sort((a,b)=>a.date.localeCompare(b.date));

  function renderList(items, containerId){
    if(!items.length){
      document.getElementById(containerId).innerHTML='<div class="empty-msg">등록된 항목이 없습니다.</div>';
      return;
    }
    const li_cls={all:'g-all','1':'g-1','2':'g-2','3':'g-3'};
    document.getElementById(containerId).innerHTML=items.map(dl=>{
      const gc=li_cls[dl.grade]||'g-all';
      return `<div class="li ${gc}">
        <div class="li-top">
          <span class="li-title">${dl.title}${gradeBadge(dl.grade)}</span>
          ${ddayBadge(dl.date)}
        </div>
        <div class="li-meta">📅 ${fmtDate(dl.date)} ${dl.manager?'· 👤 '+dl.manager:''} ${dl.note?'· '+dl.note:''}</div>
      </div>`;
    }).join('');
  }
  renderList(docs,'doc-list');
  renderList(trains,'train-list');
}

/* ── 데이터 로드 ── */
function normalDate(v){
  if(!v) return '';
  const s=String(v).trim();
  // 이미 YYYY-MM-DD 형식
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // YYYY.MM.DD 또는 YYYY/MM/DD
  const m2=s.match(/^(\d{4})[./](\d{1,2})[./](\d{1,2})$/);
  if(m2) return m2[1]+'-'+p2(+m2[2])+'-'+p2(+m2[3]);
  // 그 외: toISOString 금지 (UTC변환으로 하루 밀림)
  // 대신 로컬 날짜 파싱
  try{
    const dt=new Date(s);
    if(!isNaN(dt)){
      return dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate());
    }
  }catch{}
  return '';
}
function parseItem(raw){
  const title=String(raw.title??raw.제목??'').trim();
  const date=normalDate(raw.date??raw.마감일??'');
  const manager=String(raw.manager??raw.담당자??'').trim();
  const note=String(raw.note??raw.비고??'').trim();
  const grade=String(raw.grade??raw.학년??'all').trim();
  const type=String(raw.type??'deadline').trim();
  return {title,date,manager,note,grade:['all','1','2','3'].includes(grade)?grade:'all',type};
}
const DEFAULT_GAS_URL='https://script.google.com/macros/s/AKfycbxaJ0lWl9h32pmapHtbS2_DzLQanEif7jLTxV05DT8NiPCEiiSi7HGyndoMLhWHkqfD/exec';
async function loadData(show=false){
  const inputUrl=document.getElementById('api-url').value.trim();
  const url=inputUrl||localStorage.getItem('pohang_api_url')||DEFAULT_GAS_URL;
  const msg=document.getElementById('cfg-msg');
  if(!url){
    if(show){msg.className='cfg-msg er';msg.textContent='URL을 입력해 주세요.';}
    return;
  }
  localStorage.setItem(SAVED_KEY,url);
  try{
    const r=await fetch(url+'?nocache='+Date.now(),{cache:'no-store',mode:'cors'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const raw=await r.json();
    const arr=Array.isArray(raw)?raw:(raw.data??raw.rows??raw.items??[]);
    DL=arr.map(parseItem).filter(i=>i.date&&i.title);
    renderCal(); renderSide();
    if(show){msg.className='cfg-msg ok';msg.textContent=`✓ ${DL.length}건 불러옴`;setTimeout(()=>msg.textContent='',2500);}
  }catch(e){
    // 실패해도 기존 데이터(DL) 유지 - 다른 선생님 컴퓨터에서도 보이도록
    renderCal();renderSide();
    if(show){msg.className='cfg-msg er';msg.textContent='⚠ 불러오기 실패: '+e.message;}
    console.error(e);
    // 첫 로드 실패 시 자동 재시도 (5초, 15초 후)
    if(!show){
      setTimeout(()=>loadData(false), 5000);
      setTimeout(()=>loadData(false), 15000);
    }
  }
}

/* ── 달력 네비 ── */
function chM(d){ CM+=d; if(CM>11){CM=0;CY++;} if(CM<0){CM=11;CY--;} renderCal(); }
function goToday(){ CY=TODAY.getFullYear(); CM=TODAY.getMonth(); renderCal(); }

/* ── 초기화 ── */
// 다른 사람도 항상 기본 URL로 데이터 로드
const savedUrl = localStorage.getItem(SAVED_KEY) || DEFAULT_GAS_URL;
document.getElementById('api-url').value = savedUrl || DEFAULT_GAS_URL;
if (!document.getElementById('api-url').value.trim()) {
  document.getElementById('api-url').value = DEFAULT_GAS_URL;
}
renderCal();
loadData(false);
setInterval(()=>loadData(false), 3*60*1000); // 3분마다 자동갱신

/* 설정 패널 바깥 클릭 시 닫기 */
document.addEventListener('click', e=>{
  const panel=document.querySelector('.cfg-panel');
  const btn=document.querySelector('.cfg-btn');
  if(panel.classList.contains('open')&&!panel.contains(e.target)&&!btn.contains(e.target))
    panel.classList.remove('open');
});
</script>
</body>
