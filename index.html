<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포항제철중학교 2026 학사일정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#eef1f6;min-height:100vh;color:#1a1a2e}

/* HEADER */
.hdr{background:#1a2744;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr-left{display:flex;align-items:center;gap:12px}
.logo-wrap{width:46px;height:46px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:3px}
.logo-wrap img{width:100%;height:100%;object-fit:contain}
.hdr-text h1{color:#fff;font-size:17px;font-weight:700}
.hdr-text p{color:rgba(255,255,255,.5);font-size:11px;margin-top:1px}
.hdr-date{text-align:right;color:rgba(255,255,255,.75);font-size:13px}
.hdr-date strong{display:block;color:#fff;font-size:15px;font-weight:700}

/* SHORTCUTS */
.sc-bar{background:#16233a;padding:0 24px;display:flex;align-items:center;gap:10px;height:48px;border-bottom:1px solid rgba(255,255,255,.07)}
.sc-lbl{color:rgba(255,255,255,.4);font-size:12px;margin-right:4px}
.sc-btn{display:flex;align-items:center;gap:8px;padding:8px 20px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;font-size:13px;font-weight:600;text-decoration:none;transition:all .15s}
.sc-btn:hover{background:rgba(200,168,75,.35);border-color:#c8a84b}
.sc-dot{width:9px;height:9px;border-radius:50%}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:20px 18px}

/* GRADE TABS */
.gtabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.gtab{padding:9px 24px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid #dde1ea;background:#fff;color:#888;transition:all .13s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.gtab:hover{background:#eef1f8}
.gtab.active[data-g="all"]{background:#1a2744;color:#fff;border-color:#1a2744}
.gtab.active[data-g="1"]  {background:#1d6fb5;color:#fff;border-color:#1d6fb5}
.gtab.active[data-g="2"]  {background:#1a7a4a;color:#fff;border-color:#1a7a4a}
.gtab.active[data-g="3"]  {background:#8b2252;color:#fff;border-color:#8b2252}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr 320px;gap:18px}
@media(max-width:860px){.layout{grid-template-columns:1fr}}

/* CALENDAR */
.cal-card{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(0,0,0,.09);overflow:hidden}
.cal-top{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid #eee}
.cal-month{font-size:24px;font-weight:700;color:#1a2744}
.cal-nav{display:flex;gap:7px;align-items:center}
.cnav{width:36px;height:36px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:17px;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.cnav:hover{background:#1a2744;color:#fff;border-color:#1a2744}
.cbtntoday{padding:7px 15px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:13px;font-weight:700;color:#555;cursor:pointer;font-family:inherit;transition:all .12s}
.cbtntoday:hover{background:#1a2744;color:#fff;border-color:#1a2744}

.dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:#f4f6fb;border-bottom:1px solid #e8e8e8}
.dow{text-align:center;padding:10px 0;font-size:12px;font-weight:700;color:#999}
.dow:first-child{color:#c0392b}.dow:last-child{color:#1d6fb5}

.days-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.day{min-height:95px;padding:6px 5px;border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;position:relative}
.day:nth-child(7n){border-right:none}
.day.other{background:#fafafa}
.day.today{background:#edf3ff}
.day.today::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#1a2744}
.dn{font-size:13px;font-weight:700;width:27px;height:27px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px;color:#333}
.day.today .dn{background:#1a2744;color:#fff}
.day.sun .dn{color:#c0392b}.day.sat .dn{color:#1d6fb5}
.day.other .dn{color:#ccc}
.ev{font-size:10.5px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.45;display:block}
.ev.school{background:#e8f0fe;color:#1a56b0}
.ev.exam{background:#fde8e8;color:#9b1c1c}
.ev.holiday{background:#f0f0ec;color:#666}
.ev.dl-all{background:#1a2744;color:#fff}
.ev.dl-1{background:#dbeafe;color:#1e40af;font-weight:700}
.ev.dl-2{background:#d1fae5;color:#065f46;font-weight:700}
.ev.dl-3{background:#fce7f3;color:#831843;font-weight:700}
.ev.training{background:#fef3c7;color:#92400e;font-weight:700}

.legend{display:flex;flex-wrap:wrap;gap:10px;padding:11px 18px;border-top:1px solid #f0f0f0;background:#fafafa}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.ldot{width:10px;height:10px;border-radius:2px}

/* SIDE */
.side{display:flex;flex-direction:column;gap:16px}

.doc-card{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(0,0,0,.08);overflow:hidden}
.doc-head{padding:13px 18px;background:#1a2744;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.mo-pill{background:rgba(255,255,255,.15);font-size:11px;padding:3px 10px;border-radius:10px}
.doc-item{padding:13px 15px;border-bottom:1px solid #f3f3f3;display:flex;gap:11px;align-items:flex-start;cursor:pointer;transition:background .1s}
.doc-item:last-child{border-bottom:none}
.doc-item:hover{background:#f5f8ff}
.dbox{flex-shrink:0;width:46px;height:46px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700;line-height:1.3}
.dbox.red{background:#fde8e8;color:#9b1c1c}
.dbox.orange{background:#fff3e0;color:#b45309}
.dbox.green{background:#e8f5e9;color:#1b5e20}
.dbox.gray{background:#f0f0ec;color:#999}
.dinfo{flex:1;min-width:0}
.dname{font-size:13px;font-weight:600;margin-bottom:3px}
.dname.done{color:#bbb;text-decoration:line-through;font-weight:400}
.dsub{font-size:11px;color:#aaa}
.gbadge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:5px}
.gb-all{background:#e8ecf4;color:#1a2744}
.gb-1{background:#dbeafe;color:#1e40af}
.gb-2{background:#d1fae5;color:#065f46}
.gb-3{background:#fce7f3;color:#831843}
.gb-tr{background:#fef3c7;color:#92400e}
.empty{padding:28px 16px;text-align:center;color:#bbb;font-size:13px;line-height:2}
.loading{padding:24px;text-align:center;color:#aaa;font-size:13px}
.sp{width:22px;height:22px;border:2.5px solid #ddd;border-top-color:#1a2744;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 9px}
@keyframes spin{to{transform:rotate(360deg)}}

/* TRAINING CARD */
.train-card{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(0,0,0,.08);overflow:hidden}
.train-head{padding:13px 18px;background:#92400e;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between}

/* SETTING */
.set-card{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(0,0,0,.08);padding:16px}
.set-card h3{font-size:13px;font-weight:700;color:#666;margin-bottom:10px}
.urlinp{width:100%;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:7px;font-size:11px;font-family:monospace;color:#333;background:#fafafa;outline:none}
.urlinp:focus{border-color:#1a2744;background:#fff}
.brow{display:flex;gap:7px;margin-top:8px}
.btn{padding:8px 15px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid transparent;transition:all .12s}
.bn{background:#1a2744;color:#fff}.bn:hover{background:#253660}
.bo{background:#fff;color:#555;border-color:#ddd}.bo:hover{background:#f0f0f0}
.smsg{font-size:11px;margin-top:6px;min-height:14px}
.ok{color:#1a7a4a}.er{color:#c0392b}
.guide{margin-top:12px;padding:12px;background:#f8f9fc;border-radius:8px;font-size:11px;color:#666;line-height:1.85}
.guide b{color:#1a2744}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:300}
.mbg.open{display:flex}
.mbox{background:#fff;border-radius:16px;padding:24px;max-width:380px;width:92%;animation:pop .16s ease}
@keyframes pop{from{transform:scale(.93);opacity:0}}
.mbox h3{font-size:16px;font-weight:700;color:#1a2744;margin-bottom:15px}
.mrow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:13px;gap:14px}
.mrow:last-of-type{border:none}
.mlbl{color:#aaa;font-size:12px;flex-shrink:0}
.mval{text-align:right;font-weight:500}
.mcls{margin-top:14px;width:100%;padding:11px;background:#f0f2f5;border:none;border-radius:9px;font-size:14px;cursor:pointer;font-family:inherit;color:#555}
.mcls:hover{background:#e4e7ec}
</style>
</head>

function pd(s){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);return dt;}
function diff(dt){return Math.round((dt-TODAY)/86400000);}
function fd(dt){return `${dt.getFullYear()}.${dt.getMonth()+1}.${dt.getDate()} (${DAYS[dt.getDay()]})`;}
function gm(g){return grade==='all'||g==='all'||grade===g;}
function dlcls(g){return g==='all'?'dl-all':g==='1'?'dl-1':g==='2'?'dl-2':g==='3'?'dl-3':'training';}

function renderHeader(){
  document.getElementById('hd-d').textContent=`${TODAY.getFullYear()}년 ${TODAY.getMonth()+1}월 ${TODAY.getDate()}일`;
  document.getElementById('hd-w').textContent=`${DAYS[TODAY.getDay()]}요일`;
}

function setGrade(g){
  grade=g;
  document.querySelectorAll('.gtab').forEach(el=>el.classList.toggle('active',el.dataset.g===g));
  renderCal();renderDocs();
}

function renderCal(){
  document.getElementById('cal-title').textContent=`${CY}년 ${CM+1}월`;
  const em={};
  SCHOOL.forEach(e=>(em[e.d]=em[e.d]||[]).push({t:e.t,c:e.c}));
  DL.filter(dl=>gm(dl.grade)).forEach(dl=>{
    (em[dl.date]=em[dl.date]||[]).push({t:dl.title,c:dlcls(dl.grade),dl});
  });
  const fd1=new Date(CY,CM,1).getDay(),dim=new Date(CY,CM+1,0).getDate();
  const tot=Math.ceil((fd1+dim)/7)*7;
  let html='';
  for(let i=0;i<tot;i++){
    const dn=i-fd1+1,isOt=dn<1||dn>dim,dow=i%7;
    const disp=isOt?(dn<1?new Date(CY,CM,dn).getDate():dn-dim):dn;
    const ds=`${CY}-${String(CM+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`;
    const cdt=new Date(CY,CM,dn);cdt.setHours(0,0,0,0);
    const isT=!isOt&&cdt.getTime()===TODAY.getTime();
    let cls='day'+(isOt?' other':'')+(isT?' today':'')+(dow===0?' sun':'')+(dow===6?' sat':'');
    const evs=(!isOt&&em[ds])?em[ds].slice(0,3):[];
    const evh=evs.map(e=>{
      const oc=e.dl?` onclick="showMod(${JSON.stringify(e.dl).replace(/"/g,'&quot;')})"`:'';
      return `<span class="ev ${e.c}"${oc}>${e.t}</span>`;
    }).join('');
    html+=`<div class="${cls}"><div class="dn">${disp}</div>${evh}</div>`;
  }
  document.getElementById('days-grid').innerHTML=html;
}

function renderDocBlock(items, containerId, headLblId, emptyMsg){
  const d=TODAY;
  if(headLblId) document.getElementById(headLblId).textContent=`${d.getMonth()+1}월`;
  const ms=new Date(d.getFullYear(),d.getMonth(),1);ms.setHours(0,0,0,0);
  const list=items.map(dl=>(({...dl,ts:pd(dl.date)}))).filter(dl=>dl.ts>=ms).sort((a,b)=>a.ts-b.ts);
  if(!list.length){document.getElementById(containerId).innerHTML=`<div class="empty">${emptyMsg}</div>`;return;}
  const gl={all:'전학년','1':'1학년','2':'2학년','3':'3학년',training:'연수'};
  const gc={all:'gb-all','1':'gb-1','2':'gb-2','3':'gb-3',training:'gb-tr'};
  const html=list.map(dl=>{
    const dv=diff(dl.ts);
    let bc,tt,bt;
    if(dv<0){bc='gray';tt='완료';bt=`${Math.abs(dv)}일전`;}
    else if(dv===0){bc='red';tt='D';bt='DAY!';}
    else if(dv<=3){bc='red';tt='D';bt=`-${dv}`;}
    else if(dv<=7){bc='orange';tt='D';bt=`-${dv}`;}
    else{bc='green';tt='D';bt=`-${dv}`;}
    const nc=dv<0?'done':'';
    const oj=JSON.stringify(dl).replace(/"/g,'&quot;');
    return `<div class="doc-item" onclick="showMod(${oj})">
      <div class="dbox ${bc}"><span>${tt}</span><span>${bt}</span></div>
      <div class="dinfo">
        <div class="dname ${nc}">${dl.title}<span class="gbadge ${gc[dl.grade]||'gb-all'}">${gl[dl.grade]||''}</span></div>
        <div class="dsub">📅 ${fd(dl.ts)} · 👤 ${dl.manager||'—'}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById(containerId).innerHTML=html;
}

function renderDocs(){
  const docs=DL.filter(dl=>dl.grade!=='training'&&gm(dl.grade));
  const trains=DL.filter(dl=>dl.grade==='training');
  renderDocBlock(docs,'doc-list','mo-lbl','이번 달 제출 서류가 없습니다.');
  renderDocBlock(trains,'train-list',null,'이번 달 완료할 연수가 없습니다.');
}

function chM(d){CM+=d;if(CM>11){CM=0;CY++;}if(CM<0){CM=11;CY--;}renderCal();}
function goToday(){CY=TODAY.getFullYear();CM=TODAY.getMonth();renderCal();}

function showMod(dl){
  if(!dl.ts)dl.ts=pd(dl.date);
  const dv=diff(dl.ts);
  const dl2=dv<0?`${Math.abs(dv)}일 전 마감`:dv===0?'D-day!':`D-${dv}`;
  const gl={all:'전학년','1':'1학년','2':'2학년','3':'3학년',training:'연수'};
  document.getElementById('mt').textContent=dl.title;
  document.getElementById('mr').innerHTML=`
    <div class="mrow"><span class="mlbl">마감일</span><span class="mval">${fd(dl.ts)}</span></div>
    <div class="mrow"><span class="mlbl">남은 기간</span><span class="mval" style="color:#1a2744;font-weight:700">${dl2}</span></div>
    <div class="mrow"><span class="mlbl">대상</span><span class="mval">${gl[dl.grade]||dl.grade||'—'}</span></div>
    <div class="mrow"><span class="mlbl">담당자</span><span class="mval">${dl.manager||'—'}</span></div>
    <div class="mrow"><span class="mlbl">비고</span><span class="mval">${dl.note||'—'}</span></div>`;
  document.getElementById('modal').classList.add('open');
}
function closeMod(e){if(e.target.id==='modal')document.getElementById('modal').classList.remove('open');}

// ── 핵심: CORS 우회 + 에러 처리 ─────────────────────────────
async function loadData(show=false){
  const url=document.getElementById('api-url').value.trim();
  const msg=document.getElementById('smsg');
  if(!url){
    if(show){msg.className='smsg er';msg.textContent='URL을 입력해 주세요.';}
    DL=[];renderDocs();return;
  }
  saveUrl(url);
  document.getElementById('doc-list').innerHTML='<div class="loading"><div class="sp"></div>불러오는 중...</div>';
  document.getElementById('train-list').innerHTML='<div class="loading"><div class="sp"></div>불러오는 중...</div>';
  try{
    // no-cors 우회 없이 일반 fetch — Apps Script는 CORS 허용이 필요
    const r=await fetch(url,{method:'GET',mode:'cors'});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    if(!Array.isArray(data)) throw new Error('데이터 형식 오류');
    DL=data;
    renderCal();renderDocs();
    if(show){msg.className='smsg ok';msg.textContent=`✓ ${data.length}건 불러옴 · ${new Date().toLocaleTimeString('ko-KR')}`;}
  }catch(err){
    DL=[];renderCal();renderDocs();
    if(show){msg.className='smsg er';msg.textContent=`⚠ 실패: ${err.message} — Apps Script 재배포 필요`;}
    console.error('loadData error:',err);
  }
}

function useSample(){DL=SAMPLE;renderCal();renderDocs();document.getElementById('smsg').className='smsg ok';document.getElementById('smsg').textContent='샘플 데이터 표시 중';}

renderHeader();renderCal();
if(getSavedUrl())loadData(false);
else renderDocs();
setInterval(()=>{if(getSavedUrl())loadData(false);},5*60*1000);
