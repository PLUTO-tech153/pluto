<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포항제철중학교 2026학년도 학사일정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.4}
.hdr{background:#0f172a;display:flex;align-items:center;padding:14px 24px;position:sticky;top:0;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.hdr-left{display:flex;align-items:center;gap:12px}
.logo-wrap{width:40px;height:40px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.logo-wrap img{width:100%;height:100%;object-fit:contain}
.hdr-text h1{color:#fff;font-size:21px;font-weight:700}

.container{max-width:1480px;margin:20px auto;padding:0 20px;display:grid;grid-template-columns:1fr 360px;gap:24px}
.main-content{display:flex;flex-direction:column;min-height:calc(100vh - 100px)}

.quick-links{display:flex;gap:8px;margin-bottom:20px}
.ln-btn{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;color:#fff;transition:0.2s}
.ln-neis{background:#3b82f6} .ln-ep{background:#475569} .ln-sheet{background:#10b981}

.card{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:20px}
.card.calendar-card{flex:1;display:flex;flex-direction:column}
.card-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:16px}

.nav-month{display:flex;align-items:center;gap:16px;font-size:20px;font-weight:700;color:#1e2937}
.nav-btn{background:none;border:none;font-size:28px;cursor:pointer;color:#3b82f6;padding:0 8px}

.cal-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:50px repeat(6,1fr);gap:1px;background:#cbd5e0;border:1px solid #cbd5e0;border-radius:12px;overflow:hidden;min-height:580px}
.cal-day-label{background:#f8fafc;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;color:#64748b}
.cal-cell{background:#fff;padding:10px 8px;font-size:13px;display:flex;flex-direction:column;position:relative;overflow:hidden}
.cal-cell.sun{color:#ef4444} .cal-cell.sat{color:#3b82f6}
.cal-cell.today{border:3px solid #facc15;background:#fefce8}
.date-num{font-weight:700;font-size:15px;margin-bottom:6px}

.events-wrap{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.event-item{font-size:12px;padding:5px 7px;border-radius:6px;line-height:1.3;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:default;font-weight:600}

/* 색상 완전 일치 */
.ev-all {border-left:5px solid #f59e0b; background:#fffbeb; color:#b45309}   /* 전학년 = 주황 */
.ev-1  {border-left:5px solid #ef4444; background:#fee2e2; color:#991b1b}   /* 1학년 = 빨강 */
.ev-2  {border-left:5px solid #10b981; background:#d1fae5; color:#14532d}   /* 2학년 = 초록 */
.ev-3  {border-left:5px solid #3b82f6; background:#dbeafe; color:#1e40af}   /* 3학년 = 파랑 */

.filter-tabs{display:flex;gap:6px;background:#f1f5f9;padding:4px;border-radius:9999px}
.ft-btn{padding:8px 20px;border-radius:9999px;font-size:14px;font-weight:600;cursor:pointer;transition:0.2s;border:none}
.ft-btn.all {background:#fffbeb; color:#b45309}
.ft-btn.one {background:#fee2e2; color:#991b1b}
.ft-btn.two {background:#d1fae5; color:#14532d}
.ft-btn.three {background:#dbeafe; color:#1e40af}
.ft-btn.active {color:#fff; box-shadow:0 2px 6px rgba(0,0,0,.2)}

.list-item{padding:14px;border-radius:12px;background:#f8fafc;margin-bottom:10px;border-left:5px solid #64748b}
.li-top{display:flex;justify-content:space-between;align-items:center}
.li-title{font-weight:700;font-size:15px}
.li-date{font-size:13px;color:#64748b;font-weight:500}

.settings{position:fixed;bottom:20px;right:20px;z-index:1000}
.settings-btn{width:48px;height:48px;background:#0f172a;color:#fff;border-radius:50%;border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 15px rgba(0,0,0,.2)}
.settings-panel{position:absolute;bottom:60px;right:0;width:280px;background:#fff;border-radius:16px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.2);display:none}
.settings-panel.active{display:block}
@media(max-width:1024px){.container{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="logo-wrap"><img src="logo.png.JPG" alt="로고"></div>
    <div class="hdr-text"><h1>포항제철중학교 2026학년도 학사일정</h1></div>
  </div>
</header>

<div class="container">
  <div class="main-content">
    <div class="card calendar-card">
      <div class="card-header">
        <div class="nav-month">
          <button class="nav-btn" onclick="prevMonth()">‹</button>
          <span id="cal-month-title">2026년 3월</span>
          <button class="nav-btn" onclick="nextMonth()">›</button>
        </div>
        <div class="filter-tabs">
          <button class="ft-btn all active" onclick="setFilter('all',this)">전학년</button>
          <button class="ft-btn one" onclick="setFilter('1',this)">1학년</button>
          <button class="ft-btn two" onclick="setFilter('2',this)">2학년</button>
          <button class="ft-btn three" onclick="setFilter('3',this)">3학년</button>
        </div>
      </div>
      <div class="cal-grid" id="calendar"></div>
    </div>
  </div>

  <div class="side-content">
    <div class="quick-links">
      <a href="https://gbe.eduptl.kr/bpm_lgn_lg00_001.do" target="_blank" class="ln-btn ln-neis">나이스</a>
      <a href="http://swpsso.posco.net/idms/U61/jsp/login/login.jsp" target="_blank" class="ln-btn ln-ep">EP</a>
      <a href="https://docs.google.com/spreadsheets/d/11liSSsybAtr2fIKQi6B6lBEQEIRaGVj5qQ-L3HmWq9k/edit" target="_blank" class="ln-btn ln-sheet">관리시트</a>
    </div>

    <div class="card">
      <div class="card-title">중요 서류 마감 (전학년)</div>
      <div id="doc-list"></div>
    </div>

    <div class="card">
      <div class="card-title">교사 연수/행사</div>
      <div id="train-list"></div>
    </div>
  </div>
</div>

<div class="settings">
  <button class="settings-btn" onclick="document.querySelector('.settings-panel').classList.toggle('active')">⚙</button>
  <div class="settings-panel">
    <input type="text" id="api-url" value="https://script.google.com/macros/s/AKfycbwP6EQY_ONpeJrqiEgLo5hFszIRy4QnrD9OR4k0yuusfxvJApY-RSxFWw9kwjQId9er/exec" style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px">
    <button onclick="loadData(true)" style="width:100%;margin-top:12px;padding:12px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer">새로고침</button>
    <div id="smsg" style="margin-top:8px;text-align:center;font-size:13px"></div>
  </div>
</div>

<script>
// ==================== PDF 기반 초기 데이터 ====================

  {date:"2026-06-03", title:"임시공휴일 (지방선거)", grade:"all"},

  {date:"2026-09-26", title:"추석 연휴", grade:"all"},

  {date:"2026-12-07", title:"2차 정기시험", grade:"1"},
  {date:"2026-12-08", title:"2차 정기시험", grade:"1"},

  {date:"2026-12-07", title:"2차 정기시험", grade:"2"},
  {date:"2026-12-08", title:"2차 정기시험", grade:"2"},

  {date:"2026-12-25", title:"성탄절", grade:"all"},
  {date:"2027-02-01", title:"개학", grade:"all"},
  {date:"2027-02-05", title:"졸업식 / 종업식", grade:"all"}
];

const MY_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwP6EQY_ONpeJrqiEgLo5hFszIRy4QnrD9OR4k0yuusfxvJApY-RSxFWw9kwjQId9er/exec";
let DL = [];
let currentFilter = 'all';
let currentYear = 2026;
let currentMonth = 2;

function parseSheetItem(item) {
  // GAS가 보내는 정확한 구조에 맞춤
  let dateStr = item.title || '';           // title = 날짜 (GMT 또는 2026.04.xx)
  let titleStr = item.note || item.비고 || '';   // note = 실제 제목
  let managerStr = item.manager || item.담당자 || '';

  // 날짜 정규화
  if (dateStr.includes('GMT')) {
    dateStr = new Date(dateStr).toISOString().split('T')[0];
  } else if (dateStr.includes('.')) {
    dateStr = dateStr.replace(/\./g, '-');
  }

  return {
    date: dateStr,
    title: titleStr || '제목 없음',
    grade: item.grade || 'all',
    manager: managerStr
  };
}

window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();
  loadData(false);
});

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.ft-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCal();
}

async function loadData(showMsg) {
  const url = document.getElementById('api-url').value.trim();
  const msg = document.getElementById('smsg');
  try {
    const res = await fetch(url);
    let raw = await res.json();
    if (Array.isArray(raw)) {
      DL = raw.map(item => parseSheetItem(item));
    }
    renderCal();
    renderDocs();
    if (showMsg) {
      msg.style.color = '#10b981';
      msg.textContent = '✓ 시트 업데이트 완료';
      setTimeout(() => msg.textContent = '', 2500);
    }
  } catch(e) {
    console.error(e);
    if (showMsg) msg.textContent = '⚠ 시트 불러오기 실패';
  }
}

function prevMonth() { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCal(); }
function nextMonth() { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCal(); }

function renderCal() {
  const container = document.getElementById('calendar');
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
  const todayStr = new Date().toISOString().split('T')[0];

  const monthNames = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  document.getElementById('cal-month-title').textContent = `${currentYear}년 ${monthNames[currentMonth]}`;

  let html = '';
  ['일','월','화','수','목','금','토'].forEach(d => html += `<div class="cal-day-label">${d}</div>`);

  for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell"></div>`;

  for (let d = 1; d <= lastDate; d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr ? 'today' : '';
    const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
    const dayClass = dayOfWeek === 0 ? 'sun' : (dayOfWeek === 6 ? 'sat' : '');

    let dayEvents = [
      ...BASE_DATA.filter(ev => ev.date === dateStr),
      ...DL.filter(ev => ev.date === dateStr)
    ];

    if (currentFilter !== 'all') {
      dayEvents = dayEvents.filter(ev => ev.grade === currentFilter || ev.grade === 'all');
    }

    html += `<div class="cal-cell ${dayClass} ${isToday}">
      <span class="date-num">${d}</span>
      <div class="events-wrap">
        ${dayEvents.map(ev => `<div class="event-item ev-${ev.grade || 'all'}" title="${ev.title}">${ev.title}</div>`).join('')}
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

function renderDocs() {
  const docs = DL.filter(ev => ev.grade === 'all' || !ev.grade).sort((a,b) => new Date(a.date) - new Date(b.date));
  const trains = DL.filter(ev => ev.grade === 'training').sort((a,b) => new Date(a.date) - new Date(b.date));

  const mapping = ev => `
    <div class="list-item">
      <div class="li-top"><span class="li-title">${ev.title}</span></div>
      <div class="li-date">${ev.date ? ev.date.slice(5).replace('-','월 ') + '일' : ''}　|　${ev.manager || ''}</div>
    </div>`;

  document.getElementById('doc-list').innerHTML = docs.length ? docs.map(mapping).join('') : '<p style="padding:20px;text-align:center;color:#64748b;font-size:14px">등록된 서류가 없습니다.</p>';
  document.getElementById('train-list').innerHTML = trains.length ? trains.map(mapping).join('') : '<p style="padding:20px;text-align:center;color:#64748b;font-size:14px">예정된 연수가 없습니다.</p>';
}
</script>
